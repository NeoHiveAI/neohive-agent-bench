# HIVE-265 — Arm B (treatment) config overlay for mini-swe-agent.
#
# Used as:  mini-extra swebench -c swebench.yaml -c config/arm_b_neohive.yaml ...
# It is recursively merged ON TOP of the stock swebench.yaml, so Arm B differs
# from Arm A by EXACTLY these keys — and nothing else:
#
#   1. environment.run_args   — bind-mount the neohive-search shim into the
#                               container (the stock runner injects no run_args,
#                               so Arm A uses the default ["--rm"]). NeoHive is a
#                               PUBLIC host (neohive.logilica.com), so the container
#                               reaches it via normal egress — no host networking.
#   2. environment.forward_env — forward the NeoHive MCP URL + Cloudflare Access
#                               service token (+ per-instance hive id) into the
#                               container, so the shim can reach NeoHive through CF
#                               without baking secrets here.
#   3. agent.system_template  — tell the agent the `neohive-search` command exists
#                               and to prefer it for code navigation.
#
# __SHIM_DIR__ is substituted by run_arm_b.sh with the absolute path to this repo
# (where neohive_search.py lives) before the run.

agent:
  # Replaces the stock one-line system prompt. The task itself (instance_template,
  # submission protocol) is untouched — only the tool affordance is added.
  system_template: |
    You are a helpful assistant that can interact with a computer shell to solve programming tasks.

    You have an extra retrieval tool available in this environment:

      neohive-search "<natural-language query>" [limit]

    It performs semantic + keyword (hybrid) search over THIS repository, which has
    been pre-indexed, and prints the most relevant code chunks (file paths +
    snippets). Run it with:

      python /opt/neohive/neohive_search.py "where is the request retry/redirect logic handled" 8

    Prefer neohive-search to locate relevant code FIRST — it understands intent, so
    it is usually faster and more complete than blind `grep`/`find` across an
    unfamiliar codebase. Use its results to decide which files to open and read in
    full with normal shell commands, then make and verify your fix as usual. Fall
    back to `grep`/`find` whenever it helps; neohive-search augments your tools, it
    does not replace them.

environment:
  # --rm matches the stock default; the shim mount is the only docker delta.
  # NeoHive is public (CF-protected), so no host networking is needed.
  run_args: ["--rm", "-v", "__SHIM_DIR__:/opt/neohive:ro"]
  # Forwarded only if set in the host env (run_arm_b.sh sets these per instance).
  # CF service token gets past Cloudflare Access; NeoHive itself needs no PAT.
  forward_env: ["NEOHIVE_MCP_URL", "NEOHIVE_CF_ACCESS_CLIENT_ID", "NEOHIVE_CF_ACCESS_CLIENT_SECRET", "NEOHIVE_HIVE"]
